user  nginx;
worker_processes  auto;

error_log  /var/log/openresty/error.log info;
pid        /var/run/openresty.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format ac_ha '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_x_forwarded_for" '
                     'upstream=$upstream_addr request_time=$request_time '
                     'upstream_time=$upstream_response_time';

    access_log  /var/log/openresty/access.log ac_ha;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens off;

    client_max_body_size 50m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream ac_spring_boot {
        server 127.0.0.1:TODO_APP_PORT max_fails=2 fail_timeout=3s;
        keepalive 16;
    }

    server {
        listen 0.0.0.0:TODO_HTTP_PORT;
        server_name _;

        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "openresty ok\n";
        }

        location / {
            proxy_pass http://ac_spring_boot;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_connect_timeout 2s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_next_upstream error timeout http_502 http_503 http_504;
        }
    }
}
